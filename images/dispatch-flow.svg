<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 900" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
        </marker>
        <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
        </marker>
    </defs>

    <style>
        .bg { fill: #f8f9fa; }
        .box { fill: #ffffff; stroke: #333333; stroke-width: 1.5px; rx: 6px; }
        .line { stroke: #333333; stroke-width: 1.5px; fill: none; }
        .line-muted { stroke: #888888; stroke-width: 1.5px; fill: none; stroke-dasharray: 4,2; }
        .text-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #222222; text-anchor: middle; font-weight: 500; }
        .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #555555; text-anchor: middle; }
        .text-note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13.5px; fill: #444444; }
        .text-code { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #333333; }
    </style>

    <rect class="bg" width="100%" height="100%" />

    <rect class="box" x="240" y="40" width="140" height="40" />
    <text class="text-main" x="310" y="65">皇帝 (你)</text>

    <line class="line" x1="310" y1="80" x2="310" y2="135" marker-end="url(#arrow)"/>
    <text class="text-code" x="325" y="115">@mention / Web GUI</text>

    <rect class="box" x="220" y="140" width="180" height="60" />
    <text class="text-main" x="310" y="165">司礼监 (调度)</text>
    <text class="text-sub" x="310" y="185">接旨 -&gt; 内阁 -&gt; 派发</text>
    
    <line class="line-muted" x1="440" y1="160" x2="410" y2="160" marker-end="url(#arrow-muted)"/>
    <text class="text-note" x="450" y="165">快模型, sandbox off, maxConcurrent 4</text>
    <text class="text-note" x="450" y="185">可 spawn 15 个 subagent</text>

    <line class="line" x1="310" y1="200" x2="310" y2="255" marker-end="url(#arrow)"/>
    <text class="text-code" x="325" y="235">sessions_spawn</text>

    <rect class="box" x="220" y="260" width="180" height="60" />
    <text class="text-main" x="310" y="285">内阁 (优化)</text>
    <text class="text-sub" x="310" y="305">Prompt+Plan</text>

    <line class="line-muted" x1="440" y1="280" x2="410" y2="280" marker-end="url(#arrow-muted)"/>
    <text class="text-note" x="450" y="285">强模型, sandbox off, 无子代</text>
    <text class="text-note" x="450" y="305">读取吏部 workspace 补充 context</text>

    <line class="line" x1="310" y1="320" x2="310" y2="375" marker-end="url(#arrow)"/>
    <text class="text-note" x="325" y="355">返回【优化后 Prompt + 执行计划 + 风险提示】</text>

    <rect class="box" x="220" y="380" width="180" height="40" />
    <text class="text-main" x="310" y="405">司礼监决策派发</text>

    <line class="line-muted" x1="440" y1="400" x2="410" y2="400" marker-end="url(#arrow-muted)"/>
    <text class="text-note" x="450" y="405">按 Plan @对应部门</text>


    <line class="line" x1="310" y1="420" x2="310" y2="440" />
    <line class="line" x1="110" y1="440" x2="510" y2="440" />

    <line class="line" x1="110" y1="440" x2="110" y2="455" marker-end="url(#arrow)"/>
    <rect class="box" x="70" y="460" width="80" height="60" />
    <text class="text-main" x="110" y="485">兵部</text>
    <text class="text-sub" x="110" y="505">开发</text>

    <line class="line" x1="210" y1="440" x2="210" y2="455" marker-end="url(#arrow)"/>
    <rect class="box" x="170" y="460" width="80" height="60" />
    <text class="text-main" x="210" y="485">户部</text>
    <text class="text-sub" x="210" y="505">API</text>

    <line class="line" x1="310" y1="440" x2="310" y2="455" marker-end="url(#arrow)"/>
    <rect class="box" x="270" y="460" width="80" height="60" />
    <text class="text-main" x="310" y="485">礼部</text>
    <text class="text-sub" x="310" y="505">文案</text>

    <line class="line" x1="410" y1="440" x2="410" y2="455" marker-end="url(#arrow)"/>
    <rect class="box" x="370" y="460" width="80" height="60" />
    <text class="text-main" x="410" y="485">工部</text>
    <text class="text-sub" x="410" y="505">运维</text>

    <line class="line" x1="510" y1="440" x2="510" y2="455" marker-end="url(#arrow)"/>
    <rect class="box" x="470" y="460" width="80" height="60" />
    <text class="text-main" x="510" y="485">吏部</text>
    <text class="text-sub" x="510" y="505">知识库</text>

    <text class="text-note" x="570" y="495">... 六部+支撑部门</text>


    <path class="line-muted" d="M 510 520 L 510 550 L 530 550" />
    <text class="text-note" x="540" y="555">项目注册/进度更新 (不被其他 agent spawn)</text>
    <text class="text-note" x="540" y="575">知识读取路径：其他 agent 直接读取其 workspace</text>

    <path class="line-muted" d="M 410 520 L 410 620 L 430 620" />
    <text class="text-code" x="440" y="625">cron: 每 2h 健康巡检</text>

    <line class="line" x1="110" y1="520" x2="110" y2="590" marker-end="url(#arrow)"/>
    <text class="text-code" x="110" y="615" text-anchor="middle">git push</text>

    <line class="line" x1="110" y1="630" x2="110" y2="675" marker-end="url(#arrow)"/>

    <line class="line" x1="210" y1="520" x2="210" y2="675" marker-end="url(#arrow)"/>

    <rect class="box" x="70" y="680" width="180" height="40" />
    <text class="text-main" x="160" y="705">GitHub Webhook</text>

    <line class="line" x1="160" y1="720" x2="160" y2="755" marker-end="url(#arrow)"/>

    <rect class="box" x="90" y="760" width="140" height="80" />
    <text class="text-main" x="160" y="785">都察院</text>
    <text class="text-sub" x="160" y="805">代码审查</text>
    <text class="text-sub" x="160" y="825">独立汇报</text>

    <line class="line-muted" x1="310" y1="800" x2="240" y2="800" marker-end="url(#arrow-muted)"/>
    <text class="text-note" x="320" y="785">强模型, sandbox all, 独立审查</text>
    <text class="text-note" x="320" y="805">GitHub webhook 自动触发 / 手动@</text>
    <text class="text-note" x="320" y="825">直接向皇帝和司礼监汇报</text>

</svg>
