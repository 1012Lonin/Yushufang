<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-label="核心调度链路图">
  <title>核心调度链路</title>
  <desc>御书房多Agent调度链路：皇帝→司礼监→内阁→六部执行→都察院审查</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="520" fill="#f8fafc" rx="8"/>

  <!-- 标题 -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" font-family="sans-serif">核心调度链路</text>

  <!-- === 皇帝 === -->
  <rect x="265" y="46" width="150" height="48" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b" font-family="sans-serif">皇帝（你）</text>
  <text x="340" y="82" text-anchor="middle" font-size="10" fill="#64748b" font-family="sans-serif">@mention / Web GUI</text>

  <!-- 箭头: 皇帝 -> 司礼监 -->
  <line x1="340" y1="94" x2="340" y2="116" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="358" y="108" font-size="9" fill="#64748b" font-family="sans-serif">@mention</text>

  <!-- === 司礼监 === -->
  <rect x="240" y="118" width="200" height="62" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b" font-family="sans-serif">司礼监（调度）</text>
  <text x="340" y="153" text-anchor="middle" font-size="10" fill="#64748b" font-family="sans-serif">接旨 → 内阁 → 派发</text>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#2563eb" font-family="sans-serif">fast-model · sandbox=off · maxConcurrent=4</text>

  <!-- 箭头: 司礼监 -> 内阁 -->
  <line x1="340" y1="180" x2="340" y2="206" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="358" y="196" font-size="9" fill="#64748b" font-family="sans-serif">sessions_spawn</text>

  <!-- === 内阁 === -->
  <rect x="245" y="208" width="190" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b" font-family="sans-serif">内阁（优化）</text>
  <text x="340" y="243" text-anchor="middle" font-size="10" fill="#64748b" font-family="sans-serif">Prompt + Plan + 风险提示</text>
  <text x="340" y="258" text-anchor="middle" font-size="9" fill="#16a34a" font-family="sans-serif">strong-model · sandbox=off</text>

  <!-- 箭头: 内阁 -> 返回 司礼监（右侧折返） -->
  <path d="M 435 239 L 475 239 L 475 140 L 470 140" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="478" y="190" font-size="9" fill="#64748b" font-family="sans-serif">返回</text>

  <!-- 箭头: 司礼监 -> 决策派发 -->
  <line x1="340" y1="180" x2="340" y2="206" stroke="#64748b" stroke-width="1" display="none"/>
  <!-- 司礼监分支: 横向线 -->
  <line x1="270" y1="310" x2="560" y2="310" stroke="#64748b" stroke-width="1.5"/>

  <!-- === 决策派发节点 === -->
  <rect x="250" y="296" width="180" height="28" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="340" y="314" text-anchor="middle" font-size="10" fill="#475569" font-family="sans-serif">司礼监决策派发 @按部门</text>

  <!-- 六部门 -->
  <rect x="25" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="63" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">兵部</text>
  <text x="63" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">开发</text>

  <rect x="110" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="148" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">户部</text>
  <text x="148" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">API 监控</text>

  <rect x="195" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="233" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">礼部</text>
  <text x="233" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">文案</text>

  <rect x="280" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="318" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">工部</text>
  <text x="318" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">运维</text>

  <rect x="365" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="403" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">吏部</text>
  <text x="403" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">知识库</text>

  <rect x="450" y="340" width="76" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="488" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">刑部</text>
  <text x="488" y="371" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">法务</text>

  <!-- 连接线到六部门 -->
  <line x1="63" y1="324" x2="63" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="148" y1="324" x2="148" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="233" y1="324" x2="233" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="318" y1="324" x2="318" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="403" y1="324" x2="403" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="488" y1="324" x2="488" y2="340" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 兵部 -> git push -> Webhook -->
  <path d="M 63 380 L 63 400 L 250 400 L 250 430" stroke="#64748b" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <text x="150" y="397" font-size="9" fill="#64748b" font-family="sans-serif">git push</text>

  <!-- Webhook -> 都察院 -->
  <line x1="250" y1="450" x2="340" y2="450" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="295" y="446" font-size="9" fill="#64748b" font-family="sans-serif">GitHub</text>
  <text x="295" y="457" font-size="9" fill="#64748b" font-family="sans-serif">Webhook</text>

  <!-- === 都察院 === -->
  <rect x="345" y="426" width="130" height="48" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="446" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b" font-family="sans-serif">都察院</text>
  <text x="410" y="461" text-anchor="middle" font-size="10" fill="#64748b" font-family="sans-serif">代码审查 · 独立汇报</text>
  <text x="410" y="470" text-anchor="middle" font-size="9" fill="#dc2626" font-family="sans-serif">strong · sandbox=all</text>

  <!-- 注释框 -->
  <rect x="560" y="390" width="110" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="570" y="408" font-size="9" font-weight="bold" fill="#475569" font-family="sans-serif">部门说明</text>
  <text x="570" y="422" font-size="9" fill="#64748b" font-family="sans-serif">cron: 工部每2h巡检</text>
  <text x="570" y="436" font-size="9" fill="#64748b" font-family="sans-serif">cron: 户部日报/月报</text>
  <text x="570" y="450" font-size="9" fill="#64748b" font-family="sans-serif">workspace 直读</text>
  <text x="570" y="464" font-size="9" fill="#64748b" font-family="sans-serif">吏部: 不被spawn</text>
  <text x="570" y="478" font-size="9" fill="#64748b" font-family="sans-serif">刑部: 翰林院引用审计</text>
</svg>
