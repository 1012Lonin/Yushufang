  <line x1="440" y1="425" x2="468" y2="425" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="440" y1="425" x2="545" y2="425" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="440" y1="425" x2="615" y2="425" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="440" y1="425" x2="685" y2="425" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrB)"/>

  <!-- 修撰 -->
