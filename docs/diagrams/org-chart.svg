  <line x1="205" y1="268" x2="205" y2="276" stroke="#94a3b8" stroke-width="1"/>
  <line x1="325" y1="268" x2="325" y2="276" stroke="#94a3b8" stroke-width="1"/>
  <line x1="445" y1="268" x2="445" y2="276" stroke="#94a3b8" stroke-width="1"/>
  <line x1="565" y1="268" x2="565" y2="276" stroke="#94a3b8" stroke-width="1"/>
  <line x1="685" y1="268" x2="685" y2="276" stroke="#94a3b8" stroke-width="1"/>

