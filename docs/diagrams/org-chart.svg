<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" role="img" aria-label="组织架构图">
  <title>组织架构图</title>
  <desc>御书房明朝内阁制组织架构：皇帝、司礼监调度中枢、内阁/都察院/典簿司、六部执行层、翰林院、生活辅助部门</desc>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrB" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="820" height="560" fill="#f8fafc" rx="8"/>

  <!-- 标题 -->
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" font-family="sans-serif">组织架构图 — 明朝内阁制</text>

  <!-- ===================== 皇帝 ===================== -->
  <rect x="305" y="40" width="210" height="42" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" font-family="sans-serif">皇帝（你）</text>
  <text x="410" y="74" text-anchor="middle" font-size="10" fill="#64748b" font-family="sans-serif">@司礼监 / Web GUI / 飞书 下旨</text>

  <line x1="410" y1="82" x2="410" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===================== 司礼监 ===================== -->
  <rect x="275" y="102" width="270" height="60" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" font-family="sans-serif">司礼监（调度中枢）</text>
  <text x="410" y="138" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="sans-serif">快模型 · sandbox: off · maxConcurrent: 4 · subagents: 15个</text>

  <!-- 三路分支 -->
  <line x1="340" y1="162" x2="340" y2="182" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="162" x2="410" y2="182" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="162" x2="480" y2="182" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===================== 内阁 / 都察院 / 典簿司 ===================== -->

  <!-- 内阁 -->
  <rect x="205" y="184" width="160" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="285" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">内阁</text>
  <text x="285" y="220" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">Prompt 优化</text>
  <text x="285" y="233" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">强模型 · 无子代</text>
  <!-- 内阁 -> 司礼监（回折） -->
  <path d="M 365 215 L 390 215 L 390 132 L 375 132" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text x="393" y="175" font-size="8" fill="#64748b" font-family="sans-serif">返回 Plan</text>

  <!-- 都察院 -->
  <rect x="380" y="184" width="160" height="62" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">都察院</text>
  <text x="460" y="220" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">代码审查 · 独立</text>
  <text x="460" y="233" text-anchor="middle" font-size="9" fill="#dc2626" font-family="sans-serif">强模型 · 独立汇报</text>
  <!-- Webhook 触发 -->
  <line x1="540" y1="215" x2="570" y2="215" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="572" y="200" width="90" height="30" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="617" y="220" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">GitHub</text>

  <!-- 典簿司 -->
  <rect x="555" y="184" width="150" height="62" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">典簿司</text>
  <text x="630" y="220" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">记忆管理</text>
  <text x="630" y="233" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型 · 无子代</text>

  <!-- ===================== 六部执行层 ===================== -->
  <!-- 分支线到六部 -->
  <line x1="285" y1="246" x2="285" y2="268" stroke="#94a3b8" stroke-width="1" display="none"/>
  <line x1="460" y1="246" x2="460" y2="268" stroke="#94a3b8" stroke-width="1" display="none"/>
  <line x1="285" y1="268" x2="660" y2="268" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 六部标题 -->
  <text x="410" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#64748b" font-family="sans-serif">六 部 执 行 层</text>

