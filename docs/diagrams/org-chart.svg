  <path d="M 460 215 L 490 215 L 490 350 L 490 362" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrB)"/>
  <text x="493" y="290" font-size="9" fill="#6366f1" font-family="sans-serif">sessions_spawn</text>

