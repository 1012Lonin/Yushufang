  <rect x="30" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="85" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">兵部</text>
  <text x="85" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">开发 · git push</text>
  <text x="85" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">强模型 · sandbox=all</text>

  <rect x="150" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="205" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">户部</text>
  <text x="205" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">API 监控 · 日周月报</text>
  <text x="205" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">强模型</text>

  <rect x="270" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="325" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">礼部</text>
  <text x="325" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">学术文案</text>
  <text x="325" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型</text>

  <rect x="390" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="445" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">工部</text>
  <text x="445" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">运维 · 每2h健康巡检</text>
  <text x="445" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型</text>

  <rect x="510" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="565" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">吏部</text>
  <text x="565" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">知识库 · workspace 直读</text>
  <text x="565" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型 · 不被spawn</text>

  <rect x="630" y="276" width="110" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="685" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">刑部</text>
  <text x="685" y="310" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">法务 · 引用审计</text>
  <text x="685" y="323" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型 · 翰林院调用</text>

  <!-- 连接线 -->
