  <text x="506" y="423" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">大纲·世界观</text>
  <text x="506" y="436" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">强 · 360s</text>

  <!-- 编修 -->
  <rect x="547" y="392" width="66" height="50" rx="7" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="580" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b" font-family="sans-serif">编修</text>
  <text x="580" y="423" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">逐章≥10000字</text>
  <text x="580" y="436" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">强 · 600s</text>

  <!-- 检讨 -->
  <rect x="617" y="392" width="66" height="50" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="650" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b" font-family="sans-serif">检讨</text>
  <text x="650" y="423" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">同行评审</text>
  <text x="650" y="436" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">快 · 180s</text>

  <!-- 庶吉士 -->
  <rect x="687" y="392" width="66" height="50" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="720" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b" font-family="sans-serif">庶吉士</text>
  <text x="720" y="423" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">信息检索</text>
  <text x="720" y="436" text-anchor="middle" font-size="8" fill="#64748b" font-family="sans-serif">快 · 120s</text>

  <!-- 修撰/编修 -> 庶吉士 -->
  <path d="M 513 442 L 513 460 L 720 460 L 720 448" stroke="#7c3aed" stroke-width="0.8" fill="none" stroke-dasharray="3,2"/>
  <path d="M 580 442 L 580 460 L 720 460" stroke="#7c3aed" stroke-width="0.8" fill="none" stroke-dasharray="3,2"/>

