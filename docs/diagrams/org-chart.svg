  <line x1="630" y1="328" x2="630" y2="350" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="4,2"/>
  <line x1="630" y1="350" x2="490" y2="350" stroke="#6366f1" stroke-width="1.2"/>
  <line x1="490" y1="350" x2="490" y2="362" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrB)"/>
