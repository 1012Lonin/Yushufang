  <text x="375" y="426" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">统筹 + 终审</text>
  <text x="375" y="440" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">强 · 600s</text>
  <text x="375" y="454" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="sans-serif">sessions_spawn</text>

