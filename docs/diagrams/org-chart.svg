  <text x="205" y="422" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">学习计划 · 每日推送</text>
  <text x="205" y="436" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型</text>

  <rect x="30" y="448" width="110" height="52" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="85" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">太医院</text>
  <text x="85" y="480" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">健康 · 训练</text>
  <text x="85" y="494" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型</text>

  <rect x="150" y="448" width="110" height="52" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="205" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="sans-serif">内务府</text>
  <text x="205" y="480" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">日程 · 后勤</text>
  <text x="205" y="494" text-anchor="middle" font-size="9" fill="#64748b" font-family="sans-serif">快模型</text>

  <!-- 生活辅助标签 -->
  <text x="85" y="386" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d9488" font-family="sans-serif">生活辅助（可选）</text>

  <!-- 图例 -->
